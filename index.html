<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wynn's Studio Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        :root { 
            --p: #6c5ce7; --bg: #f0f3f9; --s: #00b894; --e: #ff7675; --glass: rgba(255, 255, 255, 0.85);
        }
        
        body { 
            font-family: 'Fredoka', "Comic Sans MS", cursive; 
            background: url('bg.jpg') center/cover no-repeat fixed; 
            margin: 0; text-transform: none; 
            overflow: hidden; color: #2d3436;
        }

        .app { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; background: rgba(240, 243, 249, 0.4); }

        .view { 
            width: 96%; height: 94%; background: var(--glass); 
            backdrop-filter: blur(20px); border-radius: 50px; 
            display: none; flex-direction: column; position: relative;
            border: 2px solid rgba(255,255,255,0.5);
            animation: slideUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        #lobby { display: grid; grid-template-columns: repeat(3, 1fr); gap: 25px; padding: 100px 60px 60px 60px; box-sizing: border-box; }

        .grade-pill { 
            background: white; border-radius: 40px; box-shadow: 0 15px 35px rgba(108, 92, 231, 0.1); 
            cursor: pointer; transition: 0.4s; display: flex; align-items: center; justify-content: center; border: 4px solid transparent;
        }
        .grade-pill:hover { transform: translateY(-10px); border-color: var(--p); }
        .grade-pill h2 { font-size: 2.5rem; color: var(--p); }

        .navbar { padding: 25px 50px; display: flex; justify-content: space-between; align-items: center; }
        .grid { flex: 1; display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; padding: 0 50px 50px 50px; overflow-y: auto; }

        .seat { 
            background: white; border-radius: 30px; display: flex; flex-direction: column; align-items: center; justify-content: center; 
            font-size: 1.2rem; font-weight: 700; min-height: 130px; cursor: pointer; transition: 0.3s;
        }
        .seat span.s-num { font-size: 2.5rem; color: #b2bec3; }
        .seat.done { background: var(--s); color: white; }
        .seat.done span.s-num { color: white; }

        .input-f { background: #f8faff; padding: 15px; border-radius: 20px; border: 2px solid #edf2f7; font-family: inherit; width: 100%; box-sizing: border-box; }
        .btn { width: 100%; padding: 20px; border-radius: 35px; border: none; font-size: 1.8rem; font-weight: 700; color: white; cursor: pointer; }

        #modal, #configModal { display: none; position: fixed; inset: 0; background: rgba(45, 52, 54, 0.4); backdrop-filter: blur(12px); z-index: 1000; align-items: center; justify-content: center; }
        .modal-c { background: white; width: 85%; max-width: 800px; padding: 40px; border-radius: 60px; text-align: center; max-height: 90vh; overflow-y: auto; }

        #wordBox { 
            font-size: clamp(2rem, 8vw, 5rem); 
            line-height: 1.1; color: var(--e); margin: 20px auto; font-weight: 700;
            min-height: 200px; display: flex; align-items: center; justify-content: center; word-break: break-word;
        }
        
        #wordCounter { font-size: 1.2rem; color: var(--p); margin-bottom: 10px; font-weight: 600; }
    </style>
</head>
<body>

<div class="app">
    <div id="lobby" class="view" style="display: grid;">
        <h1 style="position:absolute; top:20px; left:50%; transform:translateX(-50%); font-size:2rem; color:var(--p); opacity:0.6;">Recording Studio</h1>
        <div class="grade-pill" onclick="promptConfig(1)"><h2>Grade 1</h2></div>
        <div class="grade-pill" onclick="promptConfig(2)"><h2>Grade 2</h2></div>
        <div class="grade-pill" onclick="promptConfig(3)"><h2>Grade 3</h2></div>
        <div class="grade-pill" onclick="promptConfig(4)"><h2>Grade 4</h2></div>
        <div class="grade-pill" onclick="promptConfig(5)"><h2>Grade 5</h2></div>
        <div class="grade-pill" onclick="promptConfig(6)"><h2>Grade 6</h2></div>
    </div>

    <div id="main" class="view">
        <div class="navbar">
            <button onclick="location.reload()" style="border:none; background:none; cursor:pointer; color:var(--p);"><i data-lucide="arrow-left-circle" size="40"></i></button>
            <div style="display:flex; gap:20px; align-items:center;">
                <span id="gLabel" style="font-size:1.8rem; font-weight:700; color:var(--p);"></span>
                <select id="classSel" class="input-f" style="width:auto;" onchange="saveSettings()"></select>
            </div>
            <button onclick="promptConfig(activeG)" style="border:none; background:none; cursor:pointer; color:var(--p);"><i data-lucide="settings" size="40"></i></button>
        </div>
        <div class="grid" id="seatGrid"></div>
    </div>
</div>

<div id="configModal">
    <div class="modal-c">
        <h2 style="color:var(--p); font-size:2.5rem;">Setup</h2>
        <input type="number" id="classCount" class="input-f" value="5" style="margin-bottom:10px;" placeholder="Classes">
        <input type="text" id="driveLink" class="input-f" style="margin-bottom:10px;" placeholder="Drive Link">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <input type="file" id="namesFile" class="input-f" accept=".xlsx, .xls">
            <input type="file" id="wordsFile" class="input-f" accept=".xlsx, .xls">
        </div>
        <p style="text-align:left; margin-top:15px; font-weight:600;">Words per student? (0 = ALL)</p>
        <input type="number" id="wordLimit" value="0" class="input-f">
        <button class="btn" style="background:var(--s); margin-top:20px;" onclick="confirmConfig()">Confirm</button>
    </div>
</div>

<div id="modal">
    <div class="modal-c">
        <h2 id="sLabel" style="opacity:0.3;">Seat</h2>
        <div id="wordCounter">Word 1 of 1</div>
        <div id="wordBox">Ready?</div>
        <button id="startBtn" class="btn" style="background:var(--s);" onclick="start()">Start Recording</button>
        <div id="recordingControls" style="display:none;">
            <button id="nextWordBtn" class="btn" style="background:var(--p); margin-bottom:10px;" onclick="nextWord()">Next Word</button>
            <button id="stopBtn" class="btn" style="background:var(--e);" onclick="stop()">Stop & Save</button>
        </div>
        <div id="status" style="margin-top:10px;">...</div>
    </div>
</div>

<script>
    const webAppURL = 'https://script.google.com/macros/s/AKfycbwwq6P2mA46zGXVobJmcnpNRkFRzHRcyAhqY9aowwdjoQHkfMop203cHHt0Dzlq1U43/exec';
    let activeG, recorder, chunks = [], curSeat, curEl, stream;
    let wordsData = {}, namesData = {}, currentWordIdx = 0, wordsToRead = [];

    lucide.createIcons();

    function promptConfig(g) {
        activeG = g;
        document.getElementById('configModal').style.display = 'flex';
    }

    async function parseFile(file) {
        return new Promise(res => {
            const reader = new FileReader();
            reader.onload = e => {
                const wb = XLSX.read(e.target.result, {type: 'binary'});
                res(XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header:1}).flat().filter(i => i));
            };
            reader.readAsBinaryString(file);
        });
    }

    async function confirmConfig() {
        const nFile = document.getElementById('namesFile').files[0];
        const wFile = document.getElementById('wordsFile').files[0];
        if (nFile) namesData[activeG] = await parseFile(nFile);
        if (wFile) wordsData[activeG] = await parseFile(wFile);
        document.getElementById('configModal').style.display = 'none';
        launch(activeG, document.getElementById('classCount').value);
    }

    function launch(g, count) {
        document.getElementById('lobby').style.display = 'none';
        document.getElementById('main').style.display = 'flex';
        document.getElementById('gLabel').innerText = "Grade " + g;
        const sel = document.getElementById('classSel');
        sel.innerHTML = '';
        for(let i=1; i<=count; i++) {
            let v = g + (i < 10 ? "0"+i : i);
            sel.innerHTML += `<option value="${v}">${v}</option>`;
        }
        const grid = document.getElementById('seatGrid');
        grid.innerHTML = '';
        const total = namesData[g] ? namesData[g].length : 30;
        for(let i=1; i<=total; i++) {
            let name = namesData[g] ? namesData[g][i-1] : "";
            let s = document.createElement('div');
            s.className = 'seat';
            s.onclick = () => openModal(i, s, name);
            s.innerHTML = `<span class="s-num">${i}</span><small>${name}</small>`;
            grid.appendChild(s);
        }
    }

    function openModal(n, el, name) {
        curSeat = n; curEl = el;
        document.getElementById('sLabel').innerText = name || "Seat " + n;
        
        let allWords = wordsData[activeG] || ["No words uploaded"];
        let limit = parseInt(document.getElementById('wordLimit').value);
        
        // Logical Edit: Use the limit for the individual student's reading list
        wordsToRead = (limit > 0) ? allWords.slice(0, limit) : allWords;
        
        currentWordIdx = 0;
        updateWordDisplay();
        
        document.getElementById('modal').style.display = 'flex';
        document.getElementById('startBtn').style.display = 'block';
        document.getElementById('recordingControls').style.display = 'none';
        document.getElementById('status').innerText = "Press Start";
    }

    function updateWordDisplay() {
        document.getElementById('wordBox').innerText = wordsToRead[currentWordIdx];
        document.getElementById('wordCounter').innerText = `Word ${currentWordIdx + 1} of ${wordsToRead.length}`;
        document.getElementById('nextWordBtn').style.display = (currentWordIdx === wordsToRead.length - 1) ? 'none' : 'block';
    }

    function nextWord() {
        if (currentWordIdx < wordsToRead.length - 1) {
            currentWordIdx++;
            updateWordDisplay();
        }
    }

    async function start() {
        stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        recorder = new MediaRecorder(stream);
        chunks = [];
        recorder.ondataavailable = e => chunks.push(e.data);
        recorder.onstop = upload;
        recorder.start();
        document.getElementById('startBtn').style.display = 'none';
        document.getElementById('recordingControls').style.display = 'block';
        document.getElementById('status').innerText = "Recording...";
    }

    function stop() {
        recorder.stop();
        stream.getTracks().forEach(t => t.stop());
        document.getElementById('status').innerText = "Uploading...";
    }

    function upload() {
        const reader = new FileReader();
        reader.readAsDataURL(new Blob(chunks));
        reader.onloadend = () => {
            const params = new URLSearchParams();
            params.append('audio', reader.result.split(',')[1]);
            params.append('className', document.getElementById('classSel').value);
            params.append('filename', `Seat${curSeat}.webm`);
            params.append('folderId', (document.getElementById('driveLink').value.match(/[-\w]{25,}/) || [""])[0]);
            fetch(webAppURL, { method: 'POST', body: params.toString(), mode: 'no-cors' })
            .then(() => {
                curEl.classList.add('done');
                curEl.querySelector('.s-num').innerText = "✓";
                document.getElementById('modal').style.display = 'none';
            });
        };
    }

    function saveSettings() { localStorage.setItem('wynn_drive', document.getElementById('driveLink').value); }
</script>
</body>
</html>
