<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wynn Studio Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        :root { --p: #6c5ce7; --s: #00b894; --e: #ff7675; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Fredoka', "Comic Sans MS", cursive; 
            margin: 0; overflow: hidden; height: 100vh; width: 100vw;
            background: #1a1a1a url('bg.jpg') no-repeat center center fixed;
            background-size: cover;
        }

        .fs-toggle {
            position: fixed; top: 20px; right: 20px; background: rgba(255, 255, 255, 0.8);
            border: none; width: 60px; height: 60px; border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 2000; color: var(--p);
        }

        /* Views */
        .view { width: 100vw; height: 100vh; display: none; align-items: center; justify-content: center; }
        #lobby { display: flex; }

        /* Grade Grid */
        .grade-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 25px; width: 90%; max-width: 1200px; }
        .grade-pill {
            background: rgba(255, 255, 255, 0.95); padding: 50px 10px; border-radius: 40px;
            text-align: center; cursor: pointer; transition: 0.3s;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }
        .grade-pill:hover { transform: scale(1.05); border: 4px solid var(--p); }

        /* Student Grid View */
        #recordingView { flex-direction: column; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); }
        .student-grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); 
            gap: 15px; width: 95%; height: 75%; overflow-y: auto; padding: 20px;
        }
        .student-card {
            background: white; border-radius: 20px; padding: 20px; text-align: center;
            border: 3px solid #eee; cursor: pointer; transition: 0.2s;
        }
        .student-card:hover { border-color: var(--p); transform: translateY(-5px); }
        .student-card.done { background: var(--s); color: white; border-color: var(--s); }
        .student-card .num { font-size: 0.8rem; opacity: 0.5; display: block; }
        .student-card .name { font-size: 1.2rem; font-weight: 700; }

        /* Modals */
        .modal-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); 
            z-index: 3000; align-items: center; justify-content: center;
        }
        .modal-box {
            background: white; width: 90%; max-width: 600px; padding: 30px; border-radius: 40px;
            text-align: center; position: relative;
        }

        .input-large { width: 100%; padding: 15px; border-radius: 15px; border: 2px solid #eee; margin: 10px 0; font-family: inherit; font-size: 1.2rem; }
        .btn-action { width: 100%; padding: 20px; border-radius: 25px; border: none; background: var(--p); color: white; font-size: 1.5rem; font-weight: 700; cursor: pointer; margin-top: 10px; }
        
        .close-btn { position: absolute; top: 20px; right: 20px; border: none; background: none; cursor: pointer; }
    </style>
</head>
<body>

<button class="fs-toggle" onclick="toggleFullScreen()"><i data-lucide="maximize"></i></button>

<div id="lobby" class="view">
    <div class="grade-container">
        <div class="grade-pill" onclick="openSetup(1)"><h2>Grade 1</h2></div>
        <div class="grade-pill" onclick="openSetup(2)"><h2>Grade 2</h2></div>
        <div class="grade-pill" onclick="openSetup(3)"><h2>Grade 3</h2></div>
        <div class="grade-pill" onclick="openSetup(4)"><h2>Grade 4</h2></div>
        <div class="grade-pill" onclick="openSetup(5)"><h2>Grade 5</h2></div>
        <div class="grade-pill" onclick="openSetup(6)"><h2>Grade 6</h2></div>
    </div>
</div>

<div id="recordingView" class="view">
    <div style="padding: 20px; display:flex; justify-content:space-between; width:100%; align-items:center;">
        <button onclick="location.reload()" style="border:none; background:none;"><i data-lucide="home" size="40"></i></button>
        <h1 id="classTitle" style="color:var(--p); margin:0;">Class View</h1>
        <div style="width:40px;"></div>
    </div>
    <div class="student-grid" id="studentGrid"></div>
</div>

<div id="setupModal" class="modal-overlay">
    <div class="modal-box">
        <button class="close-btn" onclick="closeAll()"><i data-lucide="x"></i></button>
        <h2 style="color:var(--p)">Class Setup</h2>
        
        <input type="text" id="driveUrl" class="input-large" placeholder="Google Drive Link">
        
        <div style="text-align:left; padding: 10px;">
            <label>Student Names (Excel or Number):</label>
            <input type="file" id="nameFile" class="input-large" accept=".xlsx, .xls">
            <input type="number" id="manualCount" class="input-large" placeholder="OR Enter Student Count (e.g. 30)">
        </div>

        <button class="btn-action" onclick="startClass()">Start Class ✓</button>
    </div>
</div>

<script>
    const sfxHover = new Audio('hover.mp3');
    const sfxClick = new Audio('click.mp3');
    const sfxDing = new Audio('ding.mp3');
    
    let studentList = [];
    let selectedGrade = 0;

    lucide.createIcons();

    function openSetup(g) {
        selectedGrade = g;
        sfxClick.play();
        document.getElementById('setupModal').style.display = 'flex';
    }

    function startClass() {
        const fileInput = document.getElementById('nameFile');
        const manualCount = document.getElementById('manualCount').value;

        if (fileInput.files.length > 0) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                const rows = XLSX.utils.sheet_to_json(firstSheet, {header: 1});
                // Assume names are in the first column
                studentList = rows.flat().filter(n => n).map((name, i) => ({ id: i+1, name: name }));
                renderGrid();
            };
            reader.readAsArrayBuffer(fileInput.files[0]);
        } else {
            const count = manualCount || 30;
            studentList = Array.from({length: count}, (_, i) => ({ id: i+1, name: `Student ${i+1}` }));
            renderGrid();
        }
    }

    function renderGrid() {
        sfxDing.play();
        document.getElementById('setupModal').style.display = 'none';
        document.getElementById('lobby').style.display = 'none';
        document.getElementById('recordingView').style.display = 'flex';
        document.getElementById('classTitle').innerText = `Grade ${selectedGrade} Recording`;

        const grid = document.getElementById('studentGrid');
        grid.innerHTML = '';

        studentList.forEach(s => {
            const card = document.createElement('div');
            card.className = 'student-card';
            card.innerHTML = `<span class="num">#${s.id}</span><span class="name">${s.name}</span>`;
            card.onclick = () => {
                sfxClick.play();
                alert(`Starting recording for: ${s.name}`);
                // Link your recording/saving logic here
                card.classList.add('done');
            };
            grid.appendChild(card);
        });
    }

    function closeAll() { document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = 'none'); }
    
    function toggleFullScreen() {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen();
        else if (document.exitFullscreen) document.exitFullscreen();
    }
</script>

</body>
</html>
