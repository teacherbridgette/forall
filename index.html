<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wynn Studio | Student Recording</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        :root { --p: #6c5ce7; --s: #00b894; --e: #ff7675; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Fredoka', "Comic Sans MS", cursive; 
            margin: 0; overflow: hidden; height: 100vh; width: 100vw;
            background: #1a1a1a url('bg.jpg') no-repeat center center fixed;
            background-size: cover;
            text-transform: lowercase;
        }

        .fs-toggle {
            position: fixed; top: 20px; right: 20px; background: rgba(255, 255, 255, 0.9);
            border: none; width: 55px; height: 55px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 2000; color: var(--p);
        }

        /* VIEWS */
        .view { width: 100vw; height: 100vh; display: none; align-items: center; justify-content: center; flex-direction: column; }
        #lobby { display: flex; }

        /* GRADE SELECTION */
        .grade-container { display: grid; grid-template-columns: repeat(3, 220px); gap: 20px; }
        .grade-pill {
            background: white; padding: 40px 20px; border-radius: 35px;
            text-align: center; cursor: pointer; transition: 0.3s;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
        }
        .grade-pill:hover { transform: scale(1.05); border: 4px solid var(--p); }
        .grade-pill h2 { font-size: 2.5rem; margin: 0; color: var(--p); }

        /* STUDENT GRID */
        #recordingGrid { background: rgba(255,255,255,0.85); backdrop-filter: blur(10px); }
        .grid-area { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); 
            gap: 15px; width: 90%; height: 80%; overflow-y: auto; padding: 20px;
        }
        .student-pill {
            background: white; border-radius: 25px; padding: 25px 10px; text-align: center;
            border: 3px solid transparent; cursor: pointer; transition: 0.2s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        .student-pill:hover { border-color: var(--p); transform: translateY(-3px); }
        .student-pill.done { background: var(--s); color: white; box-shadow: 0 10px 20px rgba(0, 184, 148, 0.3); }
        .student-pill .name { font-size: 1.4rem; font-weight: 700; display: block; }

        /* RECORDING MODAL */
        .modal-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); 
            z-index: 3000; align-items: center; justify-content: center;
        }
        .modal-box {
            background: white; width: 85%; max-width: 600px; padding: 50px; 
            border-radius: 50px; text-align: center; position: relative;
        }
        .rec-pulse { position: absolute; inset: 0; border: 8px solid var(--e); border-radius: 50px; animation: pulse 1.5s infinite; display: none; pointer-events: none; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        .btn-rec { width: 100%; padding: 25px; border-radius: 30px; border: none; color: white; font-size: 2rem; font-weight: 700; cursor: pointer; margin-top: 20px; }
        
        /* SETUP MODAL */
        .setup-box { background: white; padding: 40px; border-radius: 40px; width: 90%; max-width: 500px; text-align: center; }
        .input-f { width: 100%; padding: 15px; border-radius: 15px; border: 2px solid #eee; margin: 10px 0; font-size: 1.1rem; outline: none; }
    </style>
</head>
<body>

<button class="fs-toggle" onclick="toggleFS()"><i data-lucide="maximize"></i></button>

<div id="lobby" class="view">
    <div class="grade-container">
        <div class="grade-pill" onclick="showSetup(1)"><h2>Grade 1</h2></div>
        <div class="grade-pill" onclick="showSetup(2)"><h2>Grade 2</h2></div>
        <div class="grade-pill" onclick="showSetup(3)"><h2>Grade 3</h2></div>
        <div class="grade-pill" onclick="showSetup(4)"><h2>Grade 4</h2></div>
        <div class="grade-pill" onclick="showSetup(5)"><h2>Grade 5</h2></div>
        <div class="grade-pill" onclick="showSetup(6)"><h2>Grade 6</h2></div>
    </div>
</div>

<div id="recordingGrid" class="view">
    <div style="padding: 20px; width:100%; display:flex; justify-content:space-between; align-items:center;">
        <button onclick="location.reload()" style="border:none; background:none; cursor:pointer;"><i data-lucide="home" size="32"></i></button>
        <h1 id="gridHeader" style="color:var(--p); margin:0;">grade X</h1>
        <div style="width:32px;"></div>
    </div>
    <div class="grid-area" id="pillContainer"></div>
</div>

<div id="setupModal" class="modal-overlay">
    <div class="setup-box">
        <h2 style="color:var(--p); margin-top:0;">setup class</h2>
        <input type="text" id="driveUrl" class="input-f" placeholder="paste drive folder link">
        <input type="number" id="stuCount" class="input-f" placeholder="number of students (e.g. 21)">
        <p style="font-size:0.9rem; opacity:0.6;">or upload names excel:</p>
        <input type="file" id="excelFile" class="input-f" accept=".xlsx">
        <button class="btn-rec" style="background:var(--p)" onclick="generateGrid()">Start Recording ✓</button>
        <button onclick="closeModals()" style="background:none; border:none; margin-top:15px; color:#999; cursor:pointer;">cancel</button>
    </div>
</div>

<div id="recModal" class="modal-overlay">
    <div class="modal-box">
        <div class="rec-pulse" id="pulseEl"></div>
        <h2 id="studentLabel" style="margin:0; opacity:0.5;">student 1</h2>
        <div id="wordBox" style="font-size: 4rem; font-weight:700; margin: 40px 0; color:#2d3436;">ready?</div>
        
        <button id="startBtn" class="btn-rec" style="background:var(--s);" onclick="startRec()">START</button>
        <button id="stopBtn" class="btn-rec" style="background:var(--e); display:none;" onclick="stopRec()">STOP & SAVE</button>
        
        <div id="statusTxt" style="margin-top:20px; font-weight:700; color:var(--p); font-size:1.5rem;"></div>
        <button id="cancelBtn" onclick="closeModals()" style="background:none; border:none; margin-top:20px; color:#999; cursor:pointer;">cancel</button>
    </div>
</div>

<script>
    const webAppURL = 'YOUR_GOOGLE_SCRIPT_URL_HERE'; // PASTE YOUR SCRIPT URL
    const sfxDing = new Audio('ding.mp3');
    const sfxClick = new Audio('click.mp3');

    let activeG, activeStu, activeStuEl, recorder, chunks = [], stream;
    let studentData = [];

    lucide.createIcons();

    function showSetup(g) {
        activeG = g;
        sfxClick.play();
        document.getElementById('setupModal').style.display = 'flex';
    }

    function generateGrid() {
        const count = document.getElementById('stuCount').value || 21;
        const file = document.getElementById('excelFile').files[0];
        
        if (file) {
            const r = new FileReader();
            r.onload = (e) => {
                const data = new Uint8Array(e.target.result);
                const rows = XLSX.utils.sheet_to_json(XLSX.read(data, {type: 'array'}).Sheets[XLSX.read(data, {type: 'array'}).SheetNames[0]], {header: 1});
                studentData = rows.flat().filter(n => n).map((n, i) => ({ id: i+1, name: n }));
                renderPills();
            };
            r.readAsArrayBuffer(file);
        } else {
            studentData = Array.from({length: count}, (_, i) => ({ id: i+1, name: i+1 }));
            renderPills();
        }
    }

    function renderPills() {
        document.getElementById('setupModal').style.display = 'none';
        document.getElementById('lobby').style.display = 'none';
        document.getElementById('recordingGrid').style.display = 'flex';
        document.getElementById('gridHeader').innerText = `grade ${activeG}`;

        const container = document.getElementById('pillContainer');
        container.innerHTML = '';
        studentData.forEach(s => {
            const p = document.createElement('div');
            p.className = 'student-pill';
            p.innerHTML = `<span class="name">${s.name}</span>`;
            p.onclick = () => openRec(s, p);
            container.appendChild(p);
        });
    }

    function openRec(s, el) {
        activeStu = s; activeStuEl = el;
        document.getElementById('studentLabel').innerText = `student ${s.name}`;
        document.getElementById('recModal').style.display = 'flex';
        document.getElementById('statusTxt').innerText = "";
    }

    async function startRec() {
        stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        recorder = new MediaRecorder(stream);
        chunks = [];
        recorder.ondataavailable = e => chunks.push(e.data);
        recorder.onstop = uploadFile;
        recorder.start();

        document.getElementById('startBtn').style.display = 'none';
        document.getElementById('stopBtn').style.display = 'block';
        document.getElementById('pulseEl').style.display = 'block';
        document.getElementById('statusTxt').innerText = "RECORDING...";
        document.getElementById('cancelBtn').style.display = 'none';
    }

    function stopRec() {
        recorder.stop();
        stream.getTracks().forEach(t => t.stop());
        document.getElementById('stopBtn').style.display = 'none';
        document.getElementById('pulseEl').style.display = 'none';
        document.getElementById('statusTxt').innerText = "SAVING TO DRIVE...";
    }

    function uploadFile() {
        const reader = new FileReader();
        reader.readAsDataURL(new Blob(chunks));
        reader.onloadend = () => {
            const folderLink = document.getElementById('driveUrl').value;
            const folderId = (folderLink.match(/[-\w]{25,}/) || [""])[0];
            
            const params = new URLSearchParams();
            params.append('audio', reader.result.split(',')[1]);
            params.append('filename', `Student_${activeStu.name}.webm`);
            params.append('folderId', folderId);

            fetch(webAppURL, { method: 'POST', body: params.toString(), headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, mode: 'no-cors' })
            .then(() => {
                sfxDing.play();
                activeStuEl.classList.add('done');
                closeModals();
            });
        };
    }

    function closeModals() {
        document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = 'none');
        document.getElementById('startBtn').style.display = 'block';
        document.getElementById('stopBtn').style.display = 'none';
        document.getElementById('cancelBtn').style.display = 'block';
    }

    function toggleFS() {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen();
        else if (document.exitFullscreen) document.exitFullscreen();
    }
</script>
</body>
</html>
