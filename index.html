<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wynn Studio | Original Script Sync</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        :root { --p: #6c5ce7; --s: #00b894; --e: #ff7675; --glass: rgba(255, 255, 255, 0.92); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Fredoka', Arial, sans-serif; margin: 0; text-transform: lowercase; 
            overflow: hidden; height: 100vh; 
            background: #1a1a1a url('bg.jpg') center/cover no-repeat fixed; 
        }

        .fs-toggle { 
            position: fixed; top: 20px; right: 20px; background: var(--glass); 
            border: none; width: 50px; height: 50px; border-radius: 12px; 
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; z-index: 2000; color: var(--p); 
        }

        .view { 
            width: 94%; height: 80vh; background: var(--glass); 
            backdrop-filter: blur(20px); border-radius: 40px; 
            display: none; flex-direction: column; margin: 10vh auto; 
            box-shadow: 0 30px 80px rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.3);
        }

        /* 6 PILLS HORIZONTAL */
        #lobby { 
            display: flex; flex-direction: row; align-items: center; 
            justify-content: space-evenly; padding: 0 20px; 
        }

        .grade-pill { 
            background: white; padding: 35px 10px; border-radius: 30px; 
            cursor: pointer; transition: 0.25s; width: 15%; text-align: center;
            box-shadow: 0 8px 15px rgba(0,0,0,0.05); border: 4px solid transparent;
        }
        .grade-pill:hover { transform: translateY(-8px); border-color: var(--p); }
        .grade-pill h2 { font-size: 1.5rem; margin: 0; color: var(--p); font-weight: 700; }

        .navbar { padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; }
        .grid { flex: 1; display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; padding: 20px; overflow-y: auto; }
        .seat { background: white; border-radius: 15px; padding: 20px; text-align: center; cursor: pointer; border: 2px solid #eee; font-weight: 700; color: #444; }
        .seat.done { background: var(--s); color: white; border-color: var(--s); }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 3000; align-items: center; justify-content: center; }
        .modal-c { background: white; width: 90%; max-width: 450px; padding: 30px; border-radius: 40px; text-align: center; }
        .input-f { width: 100%; padding: 12px; border-radius: 10px; border: 2px solid #eee; font-size: 1rem; margin: 6px 0; outline: none; font-family: inherit; }
        .btn { width: 100%; padding: 16px; border-radius: 18px; border: none; font-size: 1.5rem; font-weight: 700; color: white; cursor: pointer; margin-top: 10px; }
        
        .mode-row { display: flex; gap: 8px; margin-top: 5px; }
        .mode-btn { flex: 1; padding: 12px; border-radius: 12px; border: 2px solid #eee; background: white; cursor: pointer; font-weight: 700; }
        .mode-btn.active { background: var(--p); color: white; border-color: var(--p); }

        .rec-pulse { position: absolute; inset: 0; border: 8px solid var(--e); border-radius: 40px; animation: pulse 1.5s infinite; display: none; pointer-events: none; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
    </style>
</head>
<body>

<button class="fs-toggle" onclick="toggleFS()"><i data-lucide="maximize" id="fsIcon"></i></button>

<div id="lobby" class="view" style="display: flex;">
    <div class="grade-pill" onclick="openSetup(1)"><h2>grade 1</h2></div>
    <div class="grade-pill" onclick="openSetup(2)"><h2>grade 2</h2></div>
    <div class="grade-pill" onclick="openSetup(3)"><h2>grade 3</h2></div>
    <div class="grade-pill" onclick="openSetup(4)"><h2>grade 4</h2></div>
    <div class="grade-pill" onclick="openSetup(5)"><h2>grade 5</h2></div>
    <div class="grade-pill" onclick="openSetup(6)"><h2>grade 6</h2></div>
</div>

<div id="main" class="view">
    <div class="navbar">
        <button onclick="location.reload()" style="border:none; background:none; cursor:pointer;"><i data-lucide="chevron-left" size="30"></i></button>
        <h2 id="classLabel" style="color:var(--p); margin:0;"></h2>
        <button onclick="clearCache()" style="border:none; background:none; color:var(--e); cursor:pointer; font-weight:700; font-size:0.8rem;">reset checks</button>
    </div>
    <div class="grid" id="seatGrid"></div>
</div>

<div id="setupModal" class="modal">
    <div class="modal-c">
        <h2 style="color:var(--p); margin:0 0 10px 0;">setup</h2>
        <input type="text" id="driveId" class="input-f" placeholder="paste drive folder id">
        <div style="text-align:left; font-size:0.8rem; font-weight:700; color:var(--p);">student names (excel)</div>
        <input type="file" id="excelNames" class="input-f" accept=".xlsx">
        <div style="text-align:left; font-size:0.8rem; font-weight:700; color:var(--p);">reading material (txt/excel)</div>
        <input type="file" id="wordFile" class="input-f" accept=".txt,.xlsx">
        <div class="mode-row">
            <button id="modeAll" class="mode-btn active" onclick="setMode('all')">read all</button>
            <button id="modeLimit" class="mode-btn" onclick="setMode('limit')">random limit</button>
        </div>
        <input type="number" id="limitCount" class="input-f" style="display:none;" placeholder="how many items per student?">
        <button class="btn" style="background:var(--p)" onclick="processSetup()">launch ✓</button>
    </div>
</div>

<div id="recModal" class="modal">
    <div class="modal-c" style="position:relative; max-width: 600px;">
        <div class="rec-pulse" id="pulseEl"></div>
        <h2 id="sName" style="opacity:0.3; margin:0; font-size: 1.1rem;"></h2>
        <div id="wordBox" style="font-size: 2.2rem; font-weight:700; margin: 30px 0; color: #333;"></div>
        <button id="startBtn" class="btn" style="background:var(--s);" onclick="runStart()">START</button>
        <button id="stopBtn" class="btn" style="background:var(--e); display:none;" onclick="runStop()">STOP & UPLOAD</button>
        <div id="statusTxt" style="font-size:1.1rem; font-weight:700; color:var(--p); margin-top:15px;"></div>
        <button onclick="closeRec()" style="margin-top:10px; border:none; background:none; color:#bbb; cursor:pointer;">cancel</button>
    </div>
</div>

<script>
    // PASTE YOUR GOOGLE APPS SCRIPT URL HERE
    const webAppURL = 'YOUR_APPS_SCRIPT_URL';
    const sfxDing = new Audio('ding.mp3');
    let activeG, activeStu, activeStuEl, recorder, chunks = [], stream, mode = 'all', studentList = [], masterWords = [];

    window.onload = () => {
        const saved = localStorage.getItem('wynn_drive_id');
        if (saved) document.getElementById('driveId').value = saved;
        lucide.createIcons();
    };

    function setMode(m) {
        mode = m;
        document.getElementById('modeAll').classList.toggle('active', m==='all');
        document.getElementById('modeLimit').classList.toggle('active', m==='limit');
        document.getElementById('limitCount').style.display = (m === 'limit') ? 'block' : 'none';
    }

    function openSetup(g) { activeG = g; document.getElementById('setupModal').style.display = 'flex'; }

    async function processSetup() {
        const dId = document.getElementById('driveId').value;
        if(!dId) return alert("Enter Folder ID first!");
        localStorage.setItem('wynn_drive_id', dId);
        
        const wFile = document.getElementById('wordFile').files[0];
        if (wFile) {
            if (wFile.name.endsWith('.xlsx')) {
                const data = await wFile.arrayBuffer();
                masterWords = XLSX.utils.sheet_to_json(XLSX.read(data).Sheets[XLSX.read(data).SheetNames[0]], {header:1}).flat().filter(c => c);
            } else {
                masterWords = (await wFile.text()).split('\n').map(s => s.trim()).filter(s => s.length > 0);
            }
        }

        const nFile = document.getElementById('excelNames').files[0];
        if (nFile) {
            const data = await nFile.arrayBuffer();
            studentList = XLSX.utils.sheet_to_json(XLSX.read(data).Sheets[XLSX.read(data).SheetNames[0]], {header:1}).flat().filter(n => n);
        } else {
            studentList = Array.from({length: 21}, (_, i) => i + 1);
        }
        renderGrid();
    }

    function renderGrid() {
        document.getElementById('setupModal').style.display = 'none';
        document.getElementById('lobby').style.display = 'none';
        document.getElementById('main').style.display = 'flex';
        document.getElementById('classLabel').innerText = `grade ${activeG}`;
        
        const key = `wynn_done_g${activeG}`;
        const doneList = JSON.parse(localStorage.getItem(key) || "[]");
        const grid = document.getElementById('seatGrid');
        grid.innerHTML = '';
        studentList.forEach((name) => {
            const div = document.createElement('div');
            div.className = 'seat' + (doneList.includes(String(name)) ? ' done' : '');
            div.innerText = name;
            div.onclick = () => openRec(name, div);
            grid.appendChild(div);
        });
    }

    function openRec(name, el) {
        activeStu = name; activeStuEl = el;
        document.getElementById('sName').innerText = `recording student: ${name}`;
        let words = [...masterWords];
        if (mode === 'limit') {
            const count = parseInt(document.getElementById('limitCount').value) || 5;
            words = words.sort(() => 0.5 - Math.random()).slice(0, count);
        }
        document.getElementById('wordBox').innerText = words.length ? words.join(" • ") : "ready to read";
        document.getElementById('recModal').style.display = 'flex';
    }

    async function runStart() {
        stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        recorder = new MediaRecorder(stream);
        chunks = [];
        recorder.ondataavailable = e => chunks.push(e.data);
        recorder.onstop = upload;
        recorder.start();
        document.getElementById('startBtn').style.display = 'none';
        document.getElementById('stopBtn').style.display = 'block';
        document.getElementById('pulseEl').style.display = 'block';
        document.getElementById('statusTxt').innerText = "REC ON";
    }

    function runStop() {
        recorder.stop();
        stream.getTracks().forEach(t => t.stop());
        document.getElementById('stopBtn').style.display = 'none';
        document.getElementById('pulseEl').style.display = 'none';
        document.getElementById('statusTxt').innerText = "sending to drive...";
    }

    function upload() {
        const reader = new FileReader();
        reader.readAsDataURL(new Blob(chunks));
        reader.onloadend = () => {
            const params = new URLSearchParams();
            params.append('audio', reader.result.split(',')[1]);
            params.append('filename', `${activeStu}.webm`);
            params.append('className', `grade ${activeG}`); // This creates the sub-folder
            params.append('folderId', localStorage.getItem('wynn_drive_id'));
            
            fetch(webAppURL, { method: 'POST', body: params.toString(), mode: 'no-cors' })
            .then(() => {
                sfxDing.play().catch(()=>{});
                const key = `wynn_done_g${activeG}`;
                let list = JSON.parse(localStorage.getItem(key) || "[]");
                if(!list.includes(String(activeStu))) list.push(String(activeStu));
                localStorage.setItem(key, JSON.stringify(list));
                activeStuEl.classList.add('done');
                closeRec();
            });
        };
    }

    function clearCache() {
        if(confirm("Clear checks for this class?")) {
            localStorage.removeItem(`wynn_done_g${activeG}`);
            renderGrid();
        }
    }

    function closeRec() { document.getElementById('recModal').style.display = 'none'; document.getElementById('startBtn').style.display = 'block'; document.getElementById('stopBtn').style.display = 'none'; document.getElementById('statusTxt').innerText = ""; }

    function toggleFS() {
        if (!document.fullscreenElement) { document.documentElement.requestFullscreen(); document.getElementById('fsIcon').setAttribute('data-lucide', 'minimize'); } 
        else { document.exitFullscreen(); document.getElementById('fsIcon').setAttribute('data-lucide', 'maximize'); }
        lucide.createIcons();
    }
</script>
</body>
</html>
