<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wynn's Audio Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        :root { --p: #6c5ce7; --bg: #f8f9fd; --s: #00b894; --e: #ff7675; }
        body { font-family: 'Fredoka', "Comic Sans MS", cursive; background: var(--bg); margin: 0; text-transform: lowercase; overflow: hidden; }
        
        .app { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .view { width: 95%; height: 92%; background: white; border-radius: 40px; box-shadow: 0 20px 60px rgba(0,0,0,0.1); display: none; flex-direction: column; position: relative; border: 4px solid white; }
        
        /* HORIZONTAL PILLS */
        #lobby { display: flex; flex-direction: row; align-items: center; justify-content: center; gap: 30px; }
        .grade-pill { background: white; padding: 50px 70px; border-radius: 35px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); cursor: pointer; border: 4px solid transparent; transition: 0.3s; text-align: center; }
        .grade-pill:hover { border-color: var(--p); transform: translateY(-5px); }
        .grade-pill h2 { font-size: 4vw; margin: 0; color: var(--p); }

        .navbar { padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; }
        .grid { flex: 1; display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px; padding: 25px; overflow-y: auto; }
        .seat { background: white; border-radius: 20px; border: 3px solid #f1f1f1; display: flex; align-items: center; justify-content: center; font-size: 2.2rem; font-weight: 700; min-height: 110px; cursor: pointer; transition: 0.2s; color: #ccc; }
        .seat.done { background: var(--s); color: white; border-color: var(--s); box-shadow: 0 8px 20px rgba(0, 184, 148, 0.3); }

        #setupPanel { display: none; position: absolute; inset: 0; background: white; z-index: 100; padding: 50px; flex-direction: column; align-items: center; border-radius: 40px; }
        .input-f { width: 100%; max-width: 600px; padding: 18px; margin-bottom: 20px; border-radius: 20px; border: 3px solid #eee; font-family: inherit; font-size: 1.2rem; }

        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-c { background: white; width: 70%; max-width: 700px; padding: 50px; border-radius: 50px; text-align: center; }
        .word { font-size: 3.5vw; color: var(--e); margin: 30px 0; font-weight: 700; min-height: 100px; display: flex; align-items: center; justify-content: center; }
        .btn { width: 100%; padding: 22px; border-radius: 30px; border: none; font-size: 2rem; font-weight: 700; color: white; cursor: pointer; }
    </style>
</head>
<body>

<div class="app">
    <div id="lobby" class="view" style="display: flex;">
        <div class="grade-pill" onclick="launch(3)"><h2>g3</h2></div>
        <div class="grade-pill" onclick="launch(4)"><h2>g4</h2></div>
        <div class="grade-pill" onclick="launch(5)"><h2>g5</h2></div>
    </div>

    <div id="main" class="view">
        <div class="navbar">
            <button onclick="location.reload()" style="border:none; background:none; cursor:pointer; color:var(--p);"><i data-lucide="home" size="32"></i></button>
            <div style="display:flex; gap:15px; align-items:center;">
                <span id="gLabel" style="font-weight:700; color:var(--p); font-size:1.5rem;"></span>
                <select id="classSel" class="input-f" style="width:auto; margin:0; padding:10px;" onchange="saveSettings()"></select>
            </div>
            <button onclick="toggleSetup(true)" style="border:none; background:none; cursor:pointer; color:var(--p);"><i data-lucide="settings" size="32"></i></button>
        </div>
        <div class="grid" id="seatGrid"></div>

        <div id="setupPanel">
            <h1 style="color:var(--p);">Teacher Settings</h1>
            <input type="text" id="driveLink" class="input-f" placeholder="Paste Google Drive Link here..." onchange="saveSettings()">
            <input type="file" id="fileIn" class="input-f">
            <button class="btn" style="background:var(--p); width:auto; padding:15px 50px;" onclick="toggleSetup(false)">Save & Close</button>
        </div>
    </div>
</div>

<div id="modal">
    <div class="modal-c">
        <h2 id="sLabel" style="margin:0; color:var(--p);"></h2>
        <div id="wordBox" class="word">ready?</div>
        <button id="startBtn" class="btn" style="background:var(--s);" onclick="start()">Start Recording</button>
        <button id="stopBtn" class="btn" style="background:var(--e); display:none;" onclick="stop()">Stop & Save</button>
        <div id="status" style="margin-top:20px; font-weight:600; color:var(--p);">waiting...</div>
        <button onclick="closeModal()" style="margin-top:20px; background:none; border:none; color:#ccc; cursor:pointer;">cancel</button>
    </div>
</div>

<script>
    // UPDATED URL
    const webAppURL = 'https://script.google.com/macros/s/AKfycbwwq6P2mA46zGXVobJmcnpNRkFRzHRcyAhqY9aowwdjoQHkfMop203cHHt0Dzlq1U43/exec';
    const ding = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');
    
    let activeG, recorder, chunks = [], curSeat, curEl, stream;
    let words = { "3":[], "4":[], "5":[] };

    lucide.createIcons();

    // CACHE LOADING
    window.onload = () => {
        if(localStorage.getItem('wynn_drive')) document.getElementById('driveLink').value = localStorage.getItem('wynn_drive');
    };

    function saveSettings() {
        localStorage.setItem('wynn_drive', document.getElementById('driveLink').value);
        localStorage.setItem('wynn_last_c', document.getElementById('classSel').value);
    }

    function launch(g) {
        activeG = g;
        document.getElementById('lobby').style.display = 'none';
        document.getElementById('main').style.display = 'flex';
        document.getElementById('gLabel').innerText = "grade " + g;
        
        const sel = document.getElementById('classSel');
        sel.innerHTML = '';
        [1,2,3,4,5].forEach(i => {
            let v = g + "0" + i;
            let o = document.createElement('option'); o.value = v; o.innerText = v;
            if(v === localStorage.getItem('wynn_last_c')) o.selected = true;
            sel.appendChild(o);
        });
        
        const grid = document.getElementById('seatGrid');
        grid.innerHTML = '';
        for(let i=1; i<=30; i++) {
            let s = document.createElement('div'); s.className = 'seat'; s.innerText = i;
            s.onclick = () => openModal(i, s);
            grid.appendChild(s);
        }
    }

    function toggleSetup(s) { document.getElementById('setupPanel').style.display = s ? 'flex' : 'none'; }

    document.getElementById('fileIn').addEventListener('change', function(e) {
        const f = e.target.files[0];
        const r = new FileReader();
        r.onload = (evt) => {
            let list = (f.name.match(/\.xls/)) ? 
                XLSX.utils.sheet_to_json(XLSX.read(evt.target.result, {type:'binary'}).Sheets[XLSX.read(evt.target.result, {type:'binary'}).SheetNames[0]], {header:1}).flat() :
                evt.target.result.split(/\n/).map(s => s.trim());
            words[activeG] = list.filter(s => s && s.length > 0);
            alert("Success: " + words[activeG].length + " sentences loaded!");
        };
        if(f.name.match(/\.xls/)) r.readAsBinaryString(f); else r.readAsText(f);
    });

    function openModal(n, el) {
        curSeat = n; curEl = el;
        document.getElementById('sLabel').innerText = "Seat " + n;
        document.getElementById('wordBox').innerText = words[activeG][(n-1) % words[activeG].length] || "ready to record!";
        document.getElementById('modal').style.display = 'flex';
        document.getElementById('status').innerText = "Ready";
    }

    async function start() {
        stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        recorder = new MediaRecorder(stream, { audioBitsPerSecond: 24000 });
        chunks = [];
        recorder.ondataavailable = e => chunks.push(e.data);
        recorder.onstop = upload;
        recorder.start();
        document.getElementById('startBtn').style.display = 'none';
        document.getElementById('stopBtn').style.display = 'block';
        document.getElementById('status').innerText = "🔴 Recording...";
    }

    function stop() {
        recorder.stop();
        stream.getTracks().forEach(t => t.stop());
        document.getElementById('status').innerText = "⚡ Saving...";
    }

    function upload() {
        const reader = new FileReader();
        reader.readAsDataURL(new Blob(chunks));
        reader.onloadend = () => {
            const link = document.getElementById('driveLink').value;
            const id = (link.match(/[-\w]{25,}/) || [""])[0];

            const params = new URLSearchParams();
            params.append('audio', reader.result.split(',')[1]);
            params.append('className', document.getElementById('classSel').value);
            params.append('filename', `Seat${curSeat}.webm`);
            params.append('folderId', id);

            fetch(webAppURL, { method: 'POST', body: params.toString(), headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, mode: 'no-cors' })
            .then(() => {
                ding.play();
                curEl.classList.add('done');
                curEl.innerText = curSeat + " ✓";
                closeModal();
            });
        };
    }

    function closeModal() {
        document.getElementById('modal').style.display = 'none';
        document.getElementById('startBtn').style.display = 'block';
        document.getElementById('stopBtn').style.display = 'none';
    }
</script>
</body>
</html>
