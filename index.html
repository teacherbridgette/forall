<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wynn's Fast Recorder</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        :root { --p: #4834d4; --bg: #f0f2f5; --txt: #2f3542; --done: #6ab04c; --err: #eb4d4b; }
        body { font-family: 'Fredoka', "Comic Sans MS", cursive; background: var(--bg); margin: 0; text-transform: lowercase; color: var(--txt); -webkit-user-select: none; }
        
        .app-shell { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .view { width: 94%; height: 90%; background: white; border-radius: 35px; box-shadow: 0 15px 50px rgba(0,0,0,0.1); display: none; flex-direction: column; position: relative; overflow: hidden; border: 6px solid var(--p); }
        
        #lobby { display: flex; align-items: center; justify-content: center; gap: 30px; }
        .grade-btn { background: var(--p); color: white; border: none; padding: 40px 60px; border-radius: 25px; font-size: 3.5vw; cursor: pointer; box-shadow: 0 8px 0 #2f24a3; transition: 0.1s; font-family: inherit; }
        .grade-btn:active { transform: translateY(4px); box-shadow: 0 4px 0 #2f24a3; }

        .top-nav { padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; }
        .grid-container { flex: 1; display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; padding: 20px; overflow-y: auto; background: #fafafa; }
        .seat-card { background: white; border: 2px solid #eee; border-radius: 15px; font-size: 2vw; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; min-height: 80px; transition: 0.2s; box-shadow: 0 4px 0 #eee; }
        .seat-card.done { background: var(--done); color: white; border-color: var(--done); box-shadow: 0 4px 0 #2d7a3a; }

        #settingsOverlay { display: none; position: absolute; inset: 0; background: rgba(255,255,255,0.98); z-index: 100; padding: 40px; flex-direction: column; align-items: center; justify-content: center; }
        .input-group { width: 80%; margin-bottom: 20px; text-align: left; }
        .input-group label { font-weight: 600; color: var(--p); display: block; margin-bottom: 8px; }
        .field { width: 100%; padding: 12px; border-radius: 10px; border: 2px solid #ddd; font-family: inherit; font-size: 1.1vw; box-sizing: border-box; }

        #modalOverlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .modal-body { background: white; width: 60%; padding: 40px; border-radius: 40px; text-align: center; }
        .sentence-display { font-size: 3vw; color: var(--err); margin: 25px 0; font-weight: 600; min-height: 80px; display: flex; align-items: center; justify-content: center; }
        .btn-large { width: 100%; padding: 18px; border-radius: 40px; border: none; font-size: 1.8vw; color: white; cursor: pointer; font-family: inherit; font-weight: 700; }
    </style>
</head>
<body>

    <div class="app-shell">
        <div id="lobby" class="view" style="display: flex;">
            <h1 style="position:absolute; top:30px; color:var(--p);">Teacher Wynn's Recording Studio</h1>
            <button class="grade-btn" onclick="openMain(3)">grade 3</button>
            <button class="grade-btn" onclick="openMain(4)">grade 4</button>
            <button class="grade-btn" onclick="openMain(5)">grade 5</button>
        </div>

        <div id="main" class="view">
            <div class="top-nav">
                <button onclick="location.reload()" style="border:none; background:none; cursor:pointer;"><i data-lucide="home"></i></button>
                <div style="display:flex; gap:15px; align-items:center;">
                    <h2 id="gradeLabel" style="color:var(--p); margin:0;">grade 5</h2>
                    <select id="classSelect" class="field" style="width:auto;"></select>
                    <select id="taskSelect" class="field" style="width:auto;">
                        <option value="1">1 sentence</option>
                        <option value="all">read all</option>
                    </select>
                </div>
                <button onclick="toggleSetup(true)" style="border:none; background:none; cursor:pointer;"><i data-lucide="settings"></i></button>
            </div>

            <div class="grid-container" id="seatGrid"></div>

            <div id="settingsOverlay">
                <h2 style="color:var(--p);">automatic drive setup (<span id="setupGrade"></span>)</h2>
                <div class="input-group">
                    <label>google drive folder link:</label>
                    <input type="text" id="driveLink" class="field" placeholder="Paste your Drive link here...">
                </div>
                <div class="input-group">
                    <label>vocabulary file (excel or txt):</label>
                    <input type="file" id="fileInput" class="field">
                </div>
                <button class="grade-btn" style="font-size:1.5vw; padding:15px 30px;" onclick="toggleSetup(false)">Save & Start Class</button>
            </div>
        </div>
    </div>

    <div id="modalOverlay">
        <div class="modal-body">
            <div id="sentenceBox" class="sentence-display">loading...</div>
            <button id="startBtn" class="btn-large" style="background:var(--done);" onclick="startRecording()">Start Recording</button>
            <button id="stopBtn" class="btn-large" style="background:var(--err); display:none;" onclick="stopRecording()">Stop & Fast Save</button>
            <div id="statusMsg" style="margin-top:15px; font-weight:600; color:var(--p);">ready</div>
            <button onclick="closeModal()" style="background:none; border:none; margin-top:15px; color:#aaa; cursor:pointer;">cancel</button>
        </div>
    </div>

    <script>
        // UPDATED WEB APP URL
        const webAppURL = 'https://script.google.com/macros/s/AKfycbyJ76MwJxw4GSW2tJTuIInScn972G3kNnZCGiF_Vy10QuF9sb1u30i_Iauo0CnBXs8b/exec';
        
        let vocabData = { "3":[], "4":[], "5":[] };
        let activeGrade, recorder, chunks = [], currentSeat, currentEl;

        lucide.createIcons();

        function openMain(g) {
            activeGrade = g;
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('main').style.display = 'flex';
            document.getElementById('gradeLabel').innerText = "grade " + g;
            document.getElementById('setupGrade').innerText = "grade " + g;
            
            const sel = document.getElementById('classSelect');
            sel.innerHTML = '';
            [1,2,3,4,5].forEach(n => { let o = document.createElement('option'); o.value = g+"0"+n; o.innerText = g+"0"+n; sel.appendChild(o); });
            
            const grid = document.getElementById('seatGrid');
            grid.innerHTML = '';
            for(let i=1; i<=30; i++) {
                let s = document.createElement('div'); s.className = 'seat-card'; s.innerText = i;
                s.onclick = () => openModal(i, s);
                grid.appendChild(s);
            }
        }

        function toggleSetup(s) { document.getElementById('settingsOverlay').style.display = s ? 'flex' : 'none'; }

        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (evt) => {
                let list = (file.name.match(/\.xls/)) ? 
                    XLSX.utils.sheet_to_json(XLSX.read(evt.target.result, {type:'binary'}).Sheets[XLSX.read(evt.target.result, {type:'binary'}).SheetNames[0]], {header:1}).flat() :
                    evt.target.result.split(/\n/).map(s => s.trim());
                vocabData[activeGrade] = list.filter(s => s && s.length > 0);
                alert("Success! " + vocabData[activeGrade].length + " sentences loaded.");
            };
            if(file.name.match(/\.xls/)) reader.readAsBinaryString(file); else reader.readAsText(file);
        });

        function openModal(n, el) {
            currentSeat = n; currentEl = el;
            const list = vocabData[activeGrade];
            const task = document.getElementById('taskSelect').value;
            if(list.length === 0) { document.getElementById('sentenceBox').innerText = "no words uploaded"; }
            else { document.getElementById('sentenceBox').innerText = (task === 'all') ? list.join(" | ") : list[(n-1) % list.length]; }
            document.getElementById('modalOverlay').style.display = 'flex';
        }

        async function startRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                // FAST UPLOAD OPTIMIZATION
                recorder = new MediaRecorder(stream, { audioBitsPerSecond: 32000 });
                chunks = [];
                recorder.ondataavailable = e => chunks.push(e.data);
                recorder.onstop = uploadAudio;
                recorder.start();
                document.getElementById('startBtn').style.display = 'none';
                document.getElementById('stopBtn').style.display = 'block';
                document.getElementById('statusMsg').innerText = "🔴 Recording...";
            } catch (err) { alert("Enable Microphone Access!"); }
        }

        function stopRecording() { 
            recorder.stop(); 
            document.getElementById('statusMsg').innerText = "⚡ Saving Fast..."; 
        }

        function uploadAudio() {
            const reader = new FileReader();
            reader.readAsDataURL(new Blob(chunks));
            reader.onloadend = () => {
                const link = document.getElementById('driveLink').value;
                const idMatch = link.match(/[-\w]{25,}/);
                const folderId = idMatch ? idMatch[0] : "";

                const fd = new URLSearchParams();
                fd.append('audio', reader.result.split(',')[1]);
                fd.append('className', document.getElementById('classSelect').value);
                fd.append('filename', `Seat${currentSeat}.webm`);
                fd.append('folderId', folderId);

                fetch(webAppURL, { method: 'POST', body: fd, mode: 'no-cors', keepalive: true }).then(() => {
                    currentEl.classList.add('done');
                    currentEl.innerHTML = `${currentSeat} <span style="font-size:1vw;">✓</span>`;
                    closeModal();
                });
            };
        }

        function closeModal() { 
            document.getElementById('modalOverlay').style.display = 'none'; 
            document.getElementById('startBtn').style.display = 'block';
            document.getElementById('stopBtn').style.display = 'none';
            document.getElementById('statusMsg').innerText = "ready";
        }
    </script>
</body>
</html>
