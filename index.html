<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wynn Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        :root { 
            --p: #6c5ce7; --s: #00b894; --e: #ff7675; 
            --glass: rgba(255, 255, 255, 0.85);
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Fredoka', Arial, sans-serif; /* Removed cursive */
            margin: 0; text-transform: lowercase; overflow: hidden; height: 100vh;
            background: #1a1a1a url('bg.jpg') center/cover no-repeat fixed;
        }

        /* Fullscreen Toggle Button */
        .fs-toggle {
            position: fixed; top: 20px; right: 20px; 
            background: var(--glass); border: none; width: 60px; height: 60px;
            border-radius: 15px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 2000; color: var(--p);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .view { 
            width: 94%; height: 85vh; background: var(--glass); 
            backdrop-filter: blur(20px); border-radius: 40px; 
            display: none; flex-direction: column; margin: 7vh auto;
            border: 1px solid rgba(255,255,255,0.4);
        }

        /* LOBBY - Grade Pills only */
        #lobby { display: flex; align-items: center; justify-content: center; gap: 40px; }
        .grade-pill { 
            background: white; padding: 70px 90px; border-radius: 45px; 
            cursor: pointer; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            border: 5px solid transparent; box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }
        .grade-pill:hover { transform: scale(1.1); border-color: var(--p); }
        .grade-pill h2 { font-size: 5rem; margin: 0; color: var(--p); font-weight: 700; }

        /* GRID VIEW */
        .navbar { padding: 25px 45px; display: flex; justify-content: space-between; align-items: center; }
        .grid { flex: 1; display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 18px; padding: 30px; overflow-y: auto; }
        .seat { 
            background: white; border-radius: 25px; border: 2px solid #eee;
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            padding: 25px; cursor: pointer; transition: 0.2s;
        }
        .seat .n-name { font-size: 1.3rem; font-weight: 700; color: #333; text-align: center; }
        .seat .n-num { font-size: 0.9rem; color: #bbb; margin-bottom: 5px; }
        .seat.done { background: var(--s); border-color: var(--s); transform: scale(0.95); opacity: 0.8; }
        .seat.done * { color: white; }

        /* MODAL SYSTEM */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 3000; align-items: center; justify-content: center; }
        .modal-c { background: white; width: 90%; max-width: 800px; padding: 50px; border-radius: 50px; text-align: center; position: relative; }
        .rec-pulse { position: absolute; inset: 0; border: 10px solid var(--e); border-radius: 50px; animation: pulse 1.5s infinite; display: none; pointer-events: none; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.2; } 100% { opacity: 1; } }

        /* BUTTONS & INPUTS */
        .btn { width: 100%; padding: 25px; border-radius: 30px; border: none; font-size: 2rem; font-weight: 700; color: white; cursor: pointer; margin-top: 15px; }
        .form-g { margin-bottom: 20px; text-align: left; }
        .form-g label { display: block; font-weight: 700; margin-bottom: 8px; color: var(--p); font-size: 1.1rem; }
        .input-f { width: 100%; padding: 18px; border-radius: 18px; border: 2px solid #eee; font-size: 1.2rem; font-family: inherit; outline: none; }
        
        .mode-row { display: flex; gap: 12px; }
        .mode-btn { flex: 1; padding: 18px; border-radius: 18px; border: 2px solid #eee; background: white; cursor: pointer; font-weight: 700; }
        .mode-btn.active { background: var(--p); color: white; border-color: var(--p); }
    </style>
</head>
<body>

<button class="fs-toggle" onclick="toggleFS()"><i data-lucide="maximize" id="fsIcon"></i></button>

<div id="lobby" class="view" style="display: flex;">
    <div class="grade-pill" onclick="openSetup(1)"><h2>g1</h2></div>
    <div class="grade-pill" onclick="openSetup(2)"><h2>g2</h2></div>
    <div class="grade-pill" onclick="openSetup(3)"><h2>g3</h2></div>
    <div class="grade-pill" onclick="openSetup(4)"><h2>g4</h2></div>
    <div class="grade-pill" onclick="openSetup(5)"><h2>g5</h2></div>
    <div class="grade-pill" onclick="openSetup(6)"><h2>g6</h2></div>
</div>

<div id="main" class="view">
    <div class="navbar">
        <button onclick="location.reload()" style="border:none; background:none; cursor:pointer;"><i data-lucide="arrow-left-circle" size="40"></i></button>
        <h2 id="classLabel" style="color:var(--p); margin:0; font-size: 2rem;"></h2>
        <div style="width:40px;"></div>
    </div>
    <div class="grid" id="seatGrid"></div>
</div>

<div id="setupModal" class="modal">
    <div class="modal-c" style="max-width: 550px;">
        <h2 style="color:var(--p); margin-top:0;">Class Configuration</h2>
        <div class="form-g"><label>Drive Folder ID</label><input type="text" id="driveId" class="input-f" placeholder="Enter ID string"></div>
        <div class="form-g"><label>Number of Students</label><input type="number" id="stuCount" class="input-f" value="21"></div>
        <div class="form-g"><label>Student List (Excel)</label><input type="file" id="excelFile" class="input-f" accept=".xlsx"></div>
        <div class="form-g">
            <label>Recording Mode</label>
            <div class="mode-row">
                <button id="modeAll" class="mode-btn active" onclick="setMode('all')">Read All</button>
                <button id="modeLimit" class="mode-btn" onclick="setMode('limit')">Limit Random 5</button>
            </div>
        </div>
        <button class="btn" style="background:var(--p)" onclick="startStudio()">Launch ✓</button>
    </div>
</div>

<div id="recModal" class="modal">
    <div class="modal-c">
        <div class="rec-pulse" id="pulseEl"></div>
        <h2 id="sName" style="opacity:0.4; margin:0; font-size: 1.5rem;"></h2>
        <div id="wordBox" style="font-size: 4.5rem; font-weight:700; margin: 40px 0; line-height: 1.2;">ready?</div>
        <button id="startBtn" class="btn" style="background:var(--s);" onclick="runStart()">START</button>
        <button id="stopBtn" class="btn" style="background:var(--e); display:none;" onclick="runStop()">STOP & UPLOAD</button>
        <div id="statusTxt" style="font-size:1.6rem; font-weight:700; color:var(--p); margin-top:20px;"></div>
        <button id="closeBtn" onclick="closeRec()" style="margin-top:20px; background:none; border:none; color:#bbb; cursor:pointer; font-weight:700;">CANCEL</button>
    </div>
</div>

<script>
    const webAppURL = 'YOUR_GOOGLE_SCRIPT_URL_HERE';
    const sfxDing = new Audio('ding.mp3');
    const sfxClick = new Audio('click.mp3');
    
    let activeG, activeStu, activeStuEl, recorder, chunks = [], stream;
    let mode = 'all', studentList = [];
    
    // Example word bank
    const library = { 1:["Cat","Hat"], 2:["Green","Bean"], 3:["Sentence A","Sentence B"], 4:[], 5:[], 6:[] };

    lucide.createIcons();

    function setMode(m) {
        mode = m;
        document.getElementById('modeAll').classList.toggle('active', m==='all');
        document.getElementById('modeLimit').classList.toggle('active', m==='limit');
    }

    function openSetup(g) { activeG = g; document.getElementById('setupModal').style.display = 'flex'; }

    function startStudio() {
        const file = document.getElementById('excelFile').files[0];
        const count = document.getElementById('stuCount').value || 21;

        if (file) {
            const r = new FileReader();
            r.onload = (e) => {
                const data = new Uint8Array(e.target.result);
                const rows = XLSX.utils.sheet_to_json(XLSX.read(data, {type: 'array'}).Sheets[XLSX.read(data, {type: 'array'}).SheetNames[0]], {header:1});
                studentList = rows.flat().filter(n => n);
                render();
            };
            r.readAsArrayBuffer(file);
        } else {
            studentList = Array.from({length: count}, (_, i) => `Student ${i+1}`);
            render();
        }
    }

    function render() {
        document.getElementById('setupModal').style.display = 'none';
        document.getElementById('lobby').style.display = 'none';
        document.getElementById('main').style.display = 'flex';
        document.getElementById('classLabel').innerText = `Grade ${activeG}`;

        const grid = document.getElementById('seatGrid');
        grid.innerHTML = '';
        studentList.forEach((name, i) => {
            const div = document.createElement('div');
            div.className = 'seat';
            div.innerHTML = `<span class="n-num">#${i+1}</span><span class="n-name">${name}</span>`;
            div.onclick = () => openRec(name, div);
            grid.appendChild(div);
        });
    }

    function openRec(name, el) {
        activeStu = name; activeStuEl = el;
        document.getElementById('sName').innerText = name;
        
        let bank = library[activeG] || ["Reading Practice"];
        if(mode === 'limit') bank = [...bank].sort(() => 0.5 - Math.random()).slice(0, 5);
        document.getElementById('wordBox').innerText = bank.join(" • ");
        
        document.getElementById('recModal').style.display = 'flex';
    }

    async function runStart() {
        stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        recorder = new MediaRecorder(stream);
        chunks = [];
        recorder.ondataavailable = e => chunks.push(e.data);
        recorder.onstop = upload;
        recorder.start();

        document.getElementById('startBtn').style.display = 'none';
        document.getElementById('stopBtn').style.display = 'block';
        document.getElementById('pulseEl').style.display = 'block';
        document.getElementById('statusTxt').innerText = "RECORDING...";
    }

    function runStop() {
        recorder.stop();
        stream.getTracks().forEach(t => t.stop());
        document.getElementById('stopBtn').style.display = 'none';
        document.getElementById('pulseEl').style.display = 'none';
        document.getElementById('statusTxt').innerText = "UPLOADING...";
    }

    function upload() {
        const reader = new FileReader();
        reader.readAsDataURL(new Blob(chunks));
        reader.onloadend = () => {
            const params = new URLSearchParams();
            params.append('audio', reader.result.split(',')[1]);
            params.append('filename', `${activeStu}_G${activeG}.webm`);
            params.append('folderId', document.getElementById('driveId').value);

            fetch(webAppURL, { method: 'POST', body: params.toString(), mode: 'no-cors' })
            .then(() => {
                sfxDing.play();
                activeStuEl.classList.add('done');
                closeRec();
            });
        };
    }

    function closeRec() {
        document.getElementById('recModal').style.display = 'none';
        document.getElementById('startBtn').style.display = 'block';
        document.getElementById('stopBtn').style.display = 'none';
        document.getElementById('statusTxt').innerText = "";
    }

    function toggleFS() {
        const icon = document.getElementById('fsIcon');
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen();
            icon.setAttribute('data-lucide', 'minimize');
        } else {
            if (document.exitFullscreen) document.exitFullscreen();
            icon.setAttribute('data-lucide', 'maximize');
        }
        lucide.createIcons();
    }
</script>
</body>
</html>
